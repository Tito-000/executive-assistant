<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg-reto" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#06101E"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-reto)"/>

  <!-- Timeline baseline -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#F47920" stroke-width="2" opacity="0.4"/>

  <!-- 5 day nodes -->
  <g filter="url(#g1)">
    <!-- Day 1 -->
    <circle cx="160" cy="300" r="32" fill="#06101E" stroke="#F47920" stroke-width="3"/>
    <text x="160" y="307" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="22" fill="#F47920">01</text>

    <!-- Day 2 -->
    <circle cx="295" cy="300" r="32" fill="#06101E" stroke="#F47920" stroke-width="3"/>
    <text x="295" y="307" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="22" fill="#F47920">02</text>

    <!-- Day 3 (highlighted) -->
    <circle cx="430" cy="300" r="40" fill="#06101E" stroke="#D4FF00" stroke-width="3"/>
    <text x="430" y="308" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="26" fill="#D4FF00">03</text>

    <!-- Day 4 -->
    <circle cx="565" cy="300" r="32" fill="#06101E" stroke="#F47920" stroke-width="3"/>
    <text x="565" y="307" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="22" fill="#F47920">04</text>

    <!-- Day 5 (final — glow) -->
    <circle cx="700" cy="300" r="45" fill="none" stroke="#D4FF00" stroke-width="2" opacity="0.35"/>
    <circle cx="700" cy="300" r="35" fill="#F47920" stroke="#D4FF00" stroke-width="2"/>
    <text x="700" y="309" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="24" fill="#06101E">05</text>
  </g>

  <!-- Connecting dashes -->
  <g stroke="#D4FF00" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="3 5">
    <line x1="195" y1="300" x2="260" y2="300"/>
    <line x1="330" y1="300" x2="390" y2="300"/>
    <line x1="470" y1="300" x2="530" y2="300"/>
    <line x1="600" y1="300" x2="660" y2="300"/>
  </g>

  <!-- Labels -->
  <g font-family="Roboto Mono, monospace" font-size="11" fill="#8892a6" text-anchor="middle" letter-spacing="2">
    <text x="160" y="370">PRESENTATE</text>
    <text x="295" y="370">PROBLEMA</text>
    <text x="430" y="380" fill="#D4FF00" font-weight="700">SOLUCION</text>
    <text x="565" y="370">HISTORIA</text>
    <text x="700" y="380" fill="#F47920" font-weight="700">INVITA</text>
  </g>

  <!-- Play triangles on each (video symbol) -->
  <g fill="#F47920" opacity="0.7">
    <polygon points="155,240 155,250 165,245"/>
    <polygon points="290,240 290,250 300,245"/>
    <polygon points="560,240 560,250 570,245"/>
  </g>

  <!-- Rising progress arc -->
  <path d="M100 450 Q400 420 700 200" fill="none" stroke="#F47920" stroke-width="2" opacity="0.3" stroke-dasharray="2 8"/>

  <!-- Spark particles -->
  <g fill="#D4FF00" opacity="0.6">
    <circle cx="680" cy="210" r="2"/>
    <circle cx="710" cy="195" r="1.5"/>
    <circle cx="720" cy="240" r="1.8"/>
    <circle cx="665" cy="235" r="1.3"/>
  </g>
  <g fill="#F47920" opacity="0.5">
    <circle cx="700" cy="190" r="1.5"/>
    <circle cx="685" cy="265" r="1.2"/>
  </g>

  <!-- Top small title icon -->
  <text x="400" y="80" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="42" fill="#fff" letter-spacing="-1">5 DÍAS</text>
  <text x="400" y="115" text-anchor="middle" font-family="Roboto Mono, monospace" font-size="12" fill="#F47920" letter-spacing="3">1 VIDEO X DÍA · CERO EXCUSAS</text>
</svg>
