<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>

<body>

<!-- SECOND ROW: COLOR VERSIONS of best objects -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:#111;">

  <div class="cell" style="background:#0D0D0D;min-height:420px;">
    <canvas id="d1" width="300" height="300"></canvas>
    <div class="cell-label" style="color:#00E3FF;bottom:20px;">Cyan Primary</div>

    <canvas id="d2" width="300" height="300"></canvas>
    <div class="cell-label" style="color:#FAFA00;bottom:20px;">Yellow Campaign</div>
  </div>

  <div class="cell" style="background:#09060F;min-height:420px;">
    <canvas id="d3" width="300" height="300"></canvas>
    <div class="cell-label" style="color:#713DFF;bottom:20px;">Purple AI</div>
  </div>

  <div class="cell" style="background:#0A0800;min-height:420px;">
    <canvas id="d4" width="300" height="300"></canvas>
    <div class="cell-label" style="color:#F54900;bottom:20px;">Orange Urgency</div>
  </div>

<script>
// ─── UTILS ───
function rgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgba(hex, a) {
  const [r,g,b] = rgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══════════════════════════════════════════════════════
// 01 — BLACK HOLE with accretion disk
// A glowing ring of matter orbiting a dark void
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c1');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2, cy = H/2;

  ctx.clearRect(0,0,W,H);

  // Outer glow halo
  const outerGlow = ctx.createRadialGradient(cx,cy,60,cx,cy,200);
  outerGlow.addColorStop(0,'rgba(0,227,255,0)');
  outerGlow.addColorStop(0.4,'rgba(0,227,255,0.04)');
  outerGlow.addColorStop(0.7,'rgba(0,100,200,0.08)');
  outerGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath(); ctx.arc(cx,cy,200,0,Math.PI*2); ctx.fill();

  // Accretion disk — many ellipses at different angles/radii
  // The disk is tilted (not face-on) — perspective
  const diskRings = 28;
  for (let i = 0; i < diskRings; i++) {
    const t = i / diskRings;
    const rx = 50 + t * 130;        // radius grows outward
    const ry = rx * 0.22;            // flat disk perspective
    const brightness = 1 - t;       // inner = brighter
    const hue_shift = t * 60;       // inner = cold cyan, outer = warm

    // Color: inner cyan, outer fades
    const alpha = (0.05 + brightness * 0.55) * (1 - Math.abs(t - 0.3) * 0.5);
    ctx.strokeStyle = i < diskRings * 0.5
      ? `rgba(0,${180+Math.round(brightness*75)},${200+Math.round(brightness*55)},${alpha})`
      : `rgba(0,${120+Math.round(brightness*80)},${180+Math.round(brightness*60)},${alpha * 0.6})`;
    ctx.lineWidth = 0.8 + brightness * 1.2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Bright inner ring — the innermost stable orbit
  const innerRing = ctx.createLinearGradient(cx-52,cy,cx+52,cy);
  innerRing.addColorStop(0,'rgba(0,227,255,0)');
  innerRing.addColorStop(0.25,'rgba(0,227,255,0.9)');
  innerRing.addColorStop(0.5,'rgba(180,255,255,1)');
  innerRing.addColorStop(0.75,'rgba(0,227,255,0.9)');
  innerRing.addColorStop(1,'rgba(0,227,255,0)');
  ctx.strokeStyle = innerRing;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 52, 52*0.22, 0, 0, Math.PI*2);
  ctx.stroke();

  // Event horizon — the void
  ctx.fillStyle = '#050505';
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, Math.PI*2);
  ctx.fill();

  // Photon ring around event horizon
  const photon = ctx.createRadialGradient(cx,cy,36,cx,cy,46);
  photon.addColorStop(0,'rgba(0,227,255,0.6)');
  photon.addColorStop(0.5,'rgba(0,227,255,0.15)');
  photon.addColorStop(1,'rgba(0,227,255,0)');
  ctx.fillStyle = photon;
  ctx.beginPath();
  ctx.arc(cx,cy,46,0,Math.PI*2);
  ctx.fill();

  // Polar jets — thin bright lines shooting up/down from center
  const jetGrad1 = ctx.createLinearGradient(cx,cy-36,cx,cy-160);
  jetGrad1.addColorStop(0,'rgba(0,227,255,0.7)');
  jetGrad1.addColorStop(1,'rgba(0,227,255,0)');
  ctx.strokeStyle = jetGrad1;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx,cy-36); ctx.lineTo(cx,cy-160); ctx.stroke();

  const jetGrad2 = ctx.createLinearGradient(cx,cy+36,cx,cy+160);
  jetGrad2.addColorStop(0,'rgba(0,227,255,0.7)');
  jetGrad2.addColorStop(1,'rgba(0,227,255,0)');
  ctx.strokeStyle = jetGrad2;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx,cy+36); ctx.lineTo(cx,cy+160); ctx.stroke();

  // Jet width glow
  for (let w of [4,8,14]) {
    const jg = ctx.createLinearGradient(cx,cy-36,cx,cy-160);
    jg.addColorStop(0,`rgba(0,227,255,${0.05})`);
    jg.addColorStop(1,'rgba(0,227,255,0)');
    ctx.strokeStyle = jg;
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(cx,cy-36); ctx.lineTo(cx,cy-140); ctx.stroke();
  }
})();

// ═══════════════════════════════════════════════════════
// 02 — GRAVITY RAIN
// "G" letters / dots falling at different speeds, pulled down
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c2');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  ctx.clearRect(0,0,W,H);

  function seeded(s) {
    let seed = s;
    return () => { seed=(seed*9301+49297)%233280; return seed/233280; };
  }
  const rnd = seeded(99);

  const columns = 14;
  const colW = W / columns;

  for (let col = 0; col < columns; col++) {
    const x = col * colW + colW/2;
    const count = 4 + Math.floor(rnd() * 5);

    for (let i = 0; i < count; i++) {
      const y = rnd() * H;
      const speed = 0.3 + rnd() * 0.7; // simulated: faster = lower
      const size = 10 + speed * 14;
      const alpha = 0.08 + speed * 0.55;

      // The character that falls
      const chars = ['G','R','V','T','Y','·','▼'];
      const char = chars[Math.floor(rnd() * chars.length)];

      // Trail above (motion blur simulation)
      const trailLen = speed * 60;
      const trailGrad = ctx.createLinearGradient(x, y - trailLen, x, y);
      trailGrad.addColorStop(0, 'rgba(250,250,0,0)');
      trailGrad.addColorStop(1, `rgba(250,250,0,${alpha * 0.3})`);
      ctx.strokeStyle = trailGrad;
      ctx.lineWidth = size * 0.15;
      ctx.beginPath();
      ctx.moveTo(x, y - trailLen);
      ctx.lineTo(x, y);
      ctx.stroke();

      // The character itself
      ctx.font = `900 ${size}px 'Barlow Condensed', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(250,250,0,${alpha})`;
      ctx.fillText(char, x, y);
    }
  }

  // Atmospheric bottom glow — "ground" gravity source
  const groundGlow = ctx.createLinearGradient(0, H*0.7, 0, H);
  groundGlow.addColorStop(0,'rgba(250,250,0,0)');
  groundGlow.addColorStop(1,'rgba(250,250,0,0.04)');
  ctx.fillStyle = groundGlow;
  ctx.fillRect(0, H*0.7, W, H*0.3);

  // Label at bottom
  ctx.font = "700 11px 'Barlow Condensed', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(250,250,0,0.15)';
  ctx.fillText('G R V T Y', W/2, H - 24);
})();

// ═══════════════════════════════════════════════════════
// 03 — WORMHOLE
// Concentric rings converging to a bright point — infinite tunnel
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c3');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2, cy = H/2;

  ctx.clearRect(0,0,W,H);

  const rings = 32;
  for (let i = rings; i >= 0; i--) {
    const t = i / rings; // 1 = outer, 0 = inner/vanishing
    const r = 5 + t * 195;
    // Perspective squeeze: outer rings are taller ellipses
    const ry = r * (0.15 + t * 0.55);
    // Color: outer = deep purple, inner = bright cyan/white
    const alpha = t < 0.1 ? t * 5 : (0.1 + t * 0.35);
    const cyan_mix = 1 - t;

    const cr = Math.round(cyan_mix * 0);
    const cg = Math.round(cyan_mix * 200 + t * 80);
    const cb = Math.round(cyan_mix * 255 + t * 150);

    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
    ctx.lineWidth = 0.5 + (1-t) * 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, ry, 0, 0, Math.PI*2);
    ctx.stroke();

    // Cross-bars every few rings for tunnel grid feel
    if (i % 4 === 0 && t > 0.05) {
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha * 0.4})`;
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(cx - r, cy); ctx.lineTo(cx - (r * 0.95 * 0.5), cy - ry * 0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + r, cy); ctx.lineTo(cx + (r * 0.95 * 0.5), cy - ry * 0.5);
      ctx.stroke();
    }
  }

  // Vanishing point glow
  const vpGlow = ctx.createRadialGradient(cx,cy,0,cx,cy,30);
  vpGlow.addColorStop(0,'rgba(255,255,255,1)');
  vpGlow.addColorStop(0.2,'rgba(200,255,255,0.8)');
  vpGlow.addColorStop(0.5,'rgba(113,61,255,0.3)');
  vpGlow.addColorStop(1,'rgba(113,61,255,0)');
  ctx.fillStyle = vpGlow;
  ctx.beginPath();
  ctx.arc(cx,cy,30,0,Math.PI*2);
  ctx.fill();

  // Tunnel wall lines (8 lines radiating from center)
  for (let i = 0; i < 8; i++) {
    const angle = (i/8) * Math.PI * 2;
    const outerX = cx + 200 * Math.cos(angle);
    const outerY = cy + 200 * Math.sin(angle) * 0.7;
    const grad = ctx.createLinearGradient(cx,cy,outerX,outerY);
    grad.addColorStop(0,'rgba(200,200,255,0.4)');
    grad.addColorStop(0.3,'rgba(113,61,255,0.15)');
    grad.addColorStop(1,'rgba(113,61,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(outerX,outerY);
    ctx.stroke();
  }
})();

// ═══════════════════════════════════════════════════════
// 04 — IMPACT WAVE
// A mass hits — shockwave rings expand outward
// Like dropping a weight — gravity impact
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c4');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2, cy = H*0.42;

  ctx.clearRect(0,0,W,H);

  // Impact object — the falling mass
  // Shadow/trail above
  const shadowH = 90;
  const shadowGrad = ctx.createLinearGradient(cx, cy - shadowH, cx, cy);
  shadowGrad.addColorStop(0,'rgba(245,73,0,0)');
  shadowGrad.addColorStop(1,'rgba(245,73,0,0.4)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(cx-8, cy-shadowH, 16, shadowH);

  // The mass (solid triangle — GRVTY mark falling)
  ctx.fillStyle = '#F54900';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 18);
  ctx.lineTo(cx - 22, cy - 52);
  ctx.lineTo(cx + 22, cy - 52);
  ctx.closePath();
  ctx.fill();

  // Glow on mark
  const markGlow = ctx.createRadialGradient(cx, cy-35, 0, cx, cy-35, 35);
  markGlow.addColorStop(0,'rgba(245,73,0,0.5)');
  markGlow.addColorStop(1,'rgba(245,73,0,0)');
  ctx.fillStyle = markGlow;
  ctx.beginPath(); ctx.arc(cx,cy-35,35,0,Math.PI*2); ctx.fill();

  // Impact point
  const impactGlow = ctx.createRadialGradient(cx,cy,0,cx,cy,20);
  impactGlow.addColorStop(0,'rgba(255,200,100,1)');
  impactGlow.addColorStop(0.3,'rgba(245,73,0,0.8)');
  impactGlow.addColorStop(1,'rgba(245,73,0,0)');
  ctx.fillStyle = impactGlow;
  ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2); ctx.fill();

  // Shockwave rings — expanding circles, each more faded
  const waves = [
    {r:28,  ry:6,  lw:2.5, alpha:0.9},
    {r:56,  ry:11, lw:1.8, alpha:0.65},
    {r:88,  ry:17, lw:1.2, alpha:0.4},
    {r:122, ry:23, lw:0.9, alpha:0.22},
    {r:158, ry:30, lw:0.6, alpha:0.1},
    {r:196, ry:36, lw:0.4, alpha:0.05},
  ];

  waves.forEach(w => {
    const wGrad = ctx.createLinearGradient(cx-w.r, cy, cx+w.r, cy);
    wGrad.addColorStop(0,'rgba(245,73,0,0)');
    wGrad.addColorStop(0.3,`rgba(245,73,0,${w.alpha})`);
    wGrad.addColorStop(0.5,`rgba(255,160,40,${w.alpha})`);
    wGrad.addColorStop(0.7,`rgba(245,73,0,${w.alpha})`);
    wGrad.addColorStop(1,'rgba(245,73,0,0)');
    ctx.strokeStyle = wGrad;
    ctx.lineWidth = w.lw;
    ctx.beginPath();
    ctx.ellipse(cx, cy, w.r, w.ry, 0, 0, Math.PI*2);
    ctx.stroke();
  });

  // Ground plane grid lines
  const gridLines = 10;
  for (let i = 1; i <= gridLines; i++) {
    const gx = (i/gridLines) * W;
    const dist = Math.abs(gx - cx);
    const alpha = 0.04 + Math.max(0, 0.1 - dist/400);
    ctx.strokeStyle = `rgba(245,73,0,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(gx, cy); ctx.lineTo(cx, H*0.1);
    ctx.stroke();
  }
})();

// ═══════════════════════════════════════════════════════
// 05 — DENSE FIELD
// Dots compressed toward center — mass concentration
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c5');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2, cy = H/2;

  ctx.clearRect(0,0,W,H);

  function seeded(s) { let x=s; return ()=>{x=(x*9301+49297)%233280;return x/233280;}; }
  const rnd = seeded(77);

  // Generate points: more dense near center
  const N = 320;
  for (let i = 0; i < N; i++) {
    // Gaussian-ish distribution toward center
    const angle = rnd() * Math.PI * 2;
    // Use inverse square to cluster near center
    const u = rnd();
    const dist = Math.pow(u, 0.35) * 180; // more dots near 0
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    const size = 0.8 + (1 - dist/180) * 2.5;
    const alpha = 0.15 + (1 - dist/180) * 0.7;

    // Color: center = bright cyan, edges = dim
    const brightness = 1 - dist/200;
    const cr = 0, cg = Math.round(brightness * 227), cb = Math.round(brightness * 255);

    const dotGlow = ctx.createRadialGradient(x,y,0,x,y,size*2);
    dotGlow.addColorStop(0,`rgba(${cr},${cg},${cb},${alpha})`);
    dotGlow.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = dotGlow;
    ctx.beginPath();
    ctx.arc(x,y,size*2,0,Math.PI*2);
    ctx.fill();
  }

  // Center core — singularity
  const core = ctx.createRadialGradient(cx,cy,0,cx,cy,50);
  core.addColorStop(0,'rgba(255,255,255,0.9)');
  core.addColorStop(0.1,'rgba(0,227,255,0.8)');
  core.addColorStop(0.4,'rgba(0,227,255,0.2)');
  core.addColorStop(1,'rgba(0,212,106,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(cx,cy,50,0,Math.PI*2); ctx.fill();

  // Connection lines — nearest neighbor feel
  // Draw a few subtle lines between close dots
  const pts = [];
  const rnd2 = seeded(77);
  for (let i=0;i<N;i++) {
    const angle = rnd2()*Math.PI*2;
    const u=rnd2();
    const dist=Math.pow(u,0.35)*180;
    pts.push({x:cx+Math.cos(angle)*dist, y:cy+Math.sin(angle)*dist, dist});
  }
  for (let i=0;i<pts.length;i+=6) {
    for (let j=i+1;j<pts.length;j+=6) {
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (d<28 && d>0) {
        const alpha=0.03*(1-d/28)*(1-(pts[i].dist+pts[j].dist)/360);
        ctx.strokeStyle=`rgba(0,212,106,${alpha})`;
        ctx.lineWidth=0.4;
        ctx.beginPath();
        ctx.moveTo(pts[i].x,pts[i].y);
        ctx.lineTo(pts[j].x,pts[j].y);
        ctx.stroke();
      }
    }
  }
})();

// ═══════════════════════════════════════════════════════
// 06 — GRAVITATIONAL WAVE SIGNAL
// The famous LIGO signal shape — two masses merging
// A chirp: frequency and amplitude increase to peak, then ringdown
// ═══════════════════════════════════════════════════════
(function() {
  const cv = document.getElementById('c6');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  ctx.clearRect(0,0,W,H);

  const midY = H/2;
  const N = 800;

  // Chirp signal: amplitude and frequency increase toward peak
  function chirp(t) {
    // t: 0 to 1
    // Inspiraling binary: frequency goes as (1-t)^(-3/8)
    const t_merge = 0.72;
    if (t < t_merge) {
      const tau = t_merge - t;
      const freq = 0.8 * Math.pow(tau, -3/8) * 0.3;
      const amp  = 0.12 * Math.pow(tau, -1/4);
      return Math.min(amp, 0.42) * Math.sin(freq * t * 300);
    } else {
      // Ringdown: exponential decay oscillation
      const dt = t - t_merge;
      return 0.42 * Math.exp(-dt * 18) * Math.sin(dt * 120);
    }
  }

  // Draw two detector lines (H1, L1 style)
  const offsets = [-60, 60];
  const colors  = ['#00E3FF', 'rgba(0,227,255,0.3)'];

  offsets.forEach((off, idx) => {
    const lineY = midY + off;
    const col   = colors[idx];

    // Baseline
    ctx.strokeStyle = idx===0 ? 'rgba(0,227,255,0.08)' : 'rgba(0,227,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4,6]);
    ctx.beginPath();
    ctx.moveTo(40, lineY);
    ctx.lineTo(W-40, lineY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Signal
    ctx.strokeStyle = col;
    ctx.lineWidth = idx===0 ? 1.5 : 0.8;
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const t = i/N;
      const x = 40 + t * (W-80);
      const y = lineY - chirp(t) * (H*0.18);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();

    // Glow on main signal
    if (idx===0) {
      ctx.strokeStyle = 'rgba(0,227,255,0.08)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const t = i/N;
        const x = 40 + t * (W-80);
        const y = lineY - chirp(t) * (H*0.18);
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  });

  // Merge event marker
  const mergeX = 40 + 0.72 * (W-80);
  const markerGrad = ctx.createLinearGradient(mergeX, 0, mergeX, H);
  markerGrad.addColorStop(0,'rgba(0,227,255,0)');
  markerGrad.addColorStop(0.5,'rgba(0,227,255,0.3)');
  markerGrad.addColorStop(1,'rgba(0,227,255,0)');
  ctx.strokeStyle = markerGrad;
  ctx.lineWidth = 1;
  ctx.setLineDash([3,4]);
  ctx.beginPath();
  ctx.moveTo(mergeX, H*0.1);
  ctx.lineTo(mergeX, H*0.9);
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.font = "600 9px 'Inter', sans-serif";
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,227,255,0.3)';
  ctx.fillText('INSPIRALING', 44, H*0.12);
  ctx.textAlign = 'right';
  ctx.fillText('RINGDOWN', W-44, H*0.12);
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,227,255,0.5)';
  ctx.fillText('MERGER', mergeX, H*0.08);

  // Frequency scale ticks at bottom
  for (let i = 0; i <= 8; i++) {
    const tx = 40 + (i/8) * (W-80);
    ctx.strokeStyle = 'rgba(0,227,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(tx, H*0.88);
    ctx.lineTo(tx, H*0.92);
    ctx.stroke();
  }

  // Axis label
  ctx.font = "600 9px 'Inter', sans-serif";
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,227,255,0.15)';
  ctx.fillText('STRAIN (h)', 20, midY - 80);
  ctx.textAlign = 'right';
  ctx.fillText('TIME →', W-20, H*0.95);
})();

// ═══════════════════════════════════════════════════════
// BOTTOM ROW: Black hole in 4 colors
// ═══════════════════════════════════════════════════════
function drawBlackHole(canvasId, color) {
  const cv = document.getElementById(canvasId);
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W/2, cy = H/2;
  const [r,g,b] = rgb(color);

  ctx.clearRect(0,0,W,H);

  // Accretion disk rings
  const diskRings = 22;
  for (let i = 0; i < diskRings; i++) {
    const t = i / diskRings;
    const rx = 38 + t * 100;
    const ry = rx * 0.22;
    const brightness = 1 - t;
    const alpha = 0.05 + brightness * 0.55;

    ctx.strokeStyle = `rgba(${r},${Math.round(g*brightness*1.1)},${Math.round(b*brightness)},${alpha})`;
    ctx.lineWidth = 0.7 + brightness * 1.0;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Inner bright ring
  ctx.strokeStyle = `rgba(${r},${g},${b},0.9)`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 40, 40*0.22, 0, 0, Math.PI*2);
  ctx.stroke();

  // Event horizon
  ctx.fillStyle = '#0D0D0D';
  ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fill();

  // Photon ring
  const pg = ctx.createRadialGradient(cx,cy,26,cx,cy,36);
  pg.addColorStop(0,`rgba(${r},${g},${b},0.5)`);
  pg.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(cx,cy,36,0,Math.PI*2); ctx.fill();

  // Jets
  const j1 = ctx.createLinearGradient(cx,cy-26,cx,cy-120);
  j1.addColorStop(0,`rgba(${r},${g},${b},0.6)`);
  j1.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.strokeStyle=j1; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(cx,cy-26); ctx.lineTo(cx,cy-120); ctx.stroke();

  const j2 = ctx.createLinearGradient(cx,cy+26,cx,cy+120);
  j2.addColorStop(0,`rgba(${r},${g},${b},0.6)`);
  j2.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.strokeStyle=j2; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(cx,cy+26); ctx.lineTo(cx,cy+120); ctx.stroke();
}

drawBlackHole('d1', '#00E3FF');
drawBlackHole('d2', '#FAFA00');
drawBlackHole('d3', '#713DFF');
drawBlackHole('d4', '#F54900');
